services:
  luduclone:
    # Pulls the published image from GHCR by default.
    # To build locally instead, add the override file:
    #   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
    image: ghcr.io/rangodj/luduclone:latest
    container_name: luduclone
    ports:
      - "8000:8000"
    volumes:
      - luduclone-data:/data
    environment:
      # Comma-separated user:token pairs. Leave empty for OPEN auth (dev only).
      # Example: "rango:supersecret,alice:hunter2"
      LUDUCLONE_TOKENS: "${LUDUCLONE_TOKENS:-}"
      LUDUCLONE_MANIFEST_MAX_AGE: "86400"
    restart: unless-stopped

volumes:
  luduclone-data:
