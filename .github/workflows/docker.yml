name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the image locally first so we can smoke-test it before publishing.
      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          load: true
          tags: luduclone:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (health endpoint)
        run: |
          docker run -d --name luduclone-ci -p 8000:8000 luduclone:ci
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8000/health; then ok=1; break; fi
            sleep 1
          done
          echo
          docker logs luduclone-ci
          docker rm -f luduclone-ci
          test "${ok:-0}" = "1"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
