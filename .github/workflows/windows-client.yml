name: windows-client

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write  # needed to attach the exe to releases on tag pushes

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # requests + pyyaml at runtime; sv-ttk + darkdetect give the GUI a modern
      # Windows 11 (Fluent) look and OS light/dark following.
      - name: Install build deps
        run: pip install requests PyYAML sv-ttk darkdetect pyinstaller

      - name: Build luduclone.exe (CLI)
        run: >
          pyinstaller --onefile --console --name luduclone
          --collect-submodules client --collect-submodules shared
          luduclone.py

      - name: Build luduclone-gui.exe (GUI)
        run: >
          pyinstaller --onefile --windowed --name luduclone-gui
          --collect-submodules client --collect-submodules shared
          --collect-all sv_ttk
          luduclone_gui.py

      - name: Sanity check the CLI exe
        run: ./dist/luduclone.exe --help

      - uses: actions/upload-artifact@v4
        with:
          name: luduclone-windows
          path: |
            dist/luduclone.exe
            dist/luduclone-gui.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/luduclone.exe
            dist/luduclone-gui.exe
